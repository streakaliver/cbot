name: Chorcha Quiz Automation

on:
  
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Caches pip dependencies automatically

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Install Playwright Browsers and System Dependencies
      run: |
        playwright install chromium --with-deps

    - name: Create auth.json from Secret
      env:
        AUTH_JSON_CONTENT: ${{ secrets.CHORCHA_AUTH_JSON }}
      run: |
        echo "$AUTH_JSON_CONTENT" > auth.json

    - name: Run Chorcha Quiz Bot
      env:
        HEADLESS: "true"
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -u bot.py

    - name: Upload Diagnostic Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: diagnostic-screenshots
        path: |
          *.png
        if-no-files-found: ignore
