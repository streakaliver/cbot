name: Quiz Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium Browser
        run: |
          playwright install chromium --with-deps

      - name: Create auth.json from secret
        env:
          CHORCHA_AUTH: ${{ secrets.CHORCHA_AUTH_JSON }}
        run: |
          if [ -n "$CHORCHA_AUTH" ]; then
            echo "$CHORCHA_AUTH" > auth.json
            echo "auth.json successfully created from GitHub secrets."
          else
            echo "CHORCHA_AUTH_JSON secret is empty or not configured. Using committed auth.json if available."
          fi

      - name: Run Quiz Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS: 'true'
        run: python bot.py
